<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Leads Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .stats {
            padding: 20px 30px;
            background: #f5f5f5;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat {
            flex: 1;
            min-width: 150px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .content {
            padding: 30px;
        }

        .leads-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leads-table th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        .leads-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .leads-table tr:hover {
            background: #f9f9f9;
        }

        .lead-row {
            cursor: pointer;
            transition: background 0.2s;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-new {
            background: #e3f2fd;
            color: #1976d2;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-field {
            margin-bottom: 15px;
        }

        .modal-label {
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .modal-value {
            color: #333;
            font-size: 1em;
            word-break: break-all;
        }

        .close-btn {
            float: right;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            color: #999;
            border: none;
            background: none;
            padding: 0;
            width: auto;
            margin: -10px;
        }

        .close-btn:hover {
            color: #333;
            background: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .pagination {
            text-align: center;
            padding: 20px;
            gap: 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .pagination button {
            min-width: 40px;
        }

        .pagination button.active {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: auto;
            }

            .stats {
                flex-direction: column;
            }

            .leads-table {
                font-size: 0.9em;
            }

            .leads-table th,
            .leads-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Meta Leads Dashboard</h1>
            <p>View and manage leads from your Meta Instant Forms</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, email, or phone...">
            </div>
            <button onclick="loadLeads()">🔄 Refresh</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalLeads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="todayLeads">0</div>
                <div class="stat-label">Today's Leads</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="emailLeads">0</div>
                <div class="stat-label">With Email</div>
            </div>
        </div>

        <div class="content">
            <div id="errorContainer"></div>
            <div id="loadingContainer" class="loading" style="display: none;">
                Loading leads...
            </div>
            <table class="leads-table" id="leadsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="leadsBody">
                </tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <h3>No leads yet</h3>
                <p>Leads from your Meta Instant Forms will appear here</p>
            </div>
        </div>

        <div class="pagination" id="paginationContainer"></div>
    </div>

    <div class="modal" id="leadModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-header">Lead Details</div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000'; // Change to your backend URL
        let currentPage = 1;
        let allLeads = [];

        // Load leads on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadLeads();
            // Auto-refresh every 30 seconds
            setInterval(loadLeads, 30000);
        });

        async function loadLeads() {
            try {
                document.getElementById('loadingContainer').style.display = 'block';
                document.getElementById('leadsTable').style.display = 'none';
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('errorContainer').innerHTML = '';

                const response = await fetch(`${API_BASE}/api/leads?page=${currentPage}&limit=20`);
                const result = await response.json();

                if (result.success) {
                    allLeads = result.data;
                    renderLeads(result.data);
                    updateStats(result.data);
                    renderPagination(result.pagination);

                    if (result.data.length === 0) {
                        document.getElementById('emptyState').style.display = 'block';
                    } else {
                        document.getElementById('leadsTable').style.display = 'table';
                    }
                } else {
                    showError('Failed to load leads');
                }
            } catch (error) {
                showError('Connection error: Make sure your backend is running on ' + API_BASE);
                console.error('Error:', error);
            } finally {
                document.getElementById('loadingContainer').style.display = 'none';
            }
        }

        function renderLeads(leads) {
            const tbody = document.getElementById('leadsBody');
            tbody.innerHTML = '';

            leads.forEach(lead => {
                const date = new Date(lead.created_at).toLocaleDateString();
                const name = [lead.first_name, lead.last_name].filter(Boolean).join(' ') || 'N/A';
                const email = lead.email || 'N/A';
                const phone = lead.phone || 'N/A';

                const row = document.createElement('tr');
                row.className = 'lead-row';
                row.innerHTML = `
                    <td><strong>${escapeHtml(name)}</strong></td>
                    <td>${escapeHtml(email)}</td>
                    <td>${escapeHtml(phone)}</td>
                    <td>${date}</td>
                    <td><button onclick="showLeadDetails(${lead.id})">View</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        async function showLeadDetails(id) {
            try {
                const response = await fetch(`${API_BASE}/api/leads/${id}`);
                const result = await response.json();

                if (result.success) {
                    const lead = result.data;
                    const html = `
                        <div class="modal-field">
                            <div class="modal-label">First Name</div>
                            <div class="modal-value">${escapeHtml(lead.first_name || 'N/A')}</div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Last Name</div>
                            <div class="modal-value">${escapeHtml(lead.last_name || 'N/A')}</div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Email</div>
                            <div class="modal-value"><a href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email || 'N/A')}</a></div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Phone</div>
                            <div class="modal-value"><a href="tel:${escapeHtml(lead.phone)}">${escapeHtml(lead.phone || 'N/A')}</a></div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Company</div>
                            <div class="modal-value">${escapeHtml(lead.company || 'N/A')}</div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Address</div>
                            <div class="modal-value">${escapeHtml([lead.address, lead.city, lead.state, lead.zip_code].filter(Boolean).join(', ') || 'N/A')}</div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Date Received</div>
                            <div class="modal-value">${new Date(lead.created_at).toLocaleString()}</div>
                        </div>
                        <div class="modal-field">
                            <div class="modal-label">Meta Lead ID</div>
                            <div class="modal-value" style="font-size: 0.9em; color: #999;">${escapeHtml(lead.meta_lead_id)}</div>
                        </div>
                    `;
                    document.getElementById('modalBody').innerHTML = html;
                    document.getElementById('leadModal').classList.add('active');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function closeModal() {
            document.getElementById('leadModal').classList.remove('active');
        }

        function updateStats(leads) {
            document.getElementById('totalLeads').textContent = leads.length;

            const today = new Date().toDateString();
            const todayLeads = leads.filter(lead => 
                new Date(lead.created_at).toDateString() === today
            ).length;
            document.getElementById('todayLeads').textContent = todayLeads;

            const emailLeads = leads.filter(lead => lead.email).length;
            document.getElementById('emailLeads').textContent = emailLeads;
        }

        function renderPagination(pagination) {
            const container = document.getElementById('paginationContainer');
            container.innerHTML = '';

            for (let i = 1; i <= pagination.pages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                if (i === currentPage) btn.classList.add('active');
                btn.onclick = () => {
                    currentPage = i;
                    loadLeads();
                    window.scrollTo(0, 0);
                };
                container.appendChild(btn);
            }
        }

        function showError(message) {
            document.getElementById('errorContainer').innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const query = e.target.value.toLowerCase();
            if (query.length === 0) {
                loadLeads();
                return;
            }

            const filtered = allLeads.filter(lead => 
                (lead.first_name && lead.first_name.toLowerCase().includes(query)) ||
                (lead.last_name && lead.last_name.toLowerCase().includes(query)) ||
                (lead.email && lead.email.toLowerCase().includes(query)) ||
                (lead.phone && lead.phone.includes(query))
            );

            renderLeads(filtered);
            updateStats(filtered);
        });

        // Close modal when clicking outside
        document.getElementById('leadModal').addEventListener('click', (e) => {
            if (e.target.id === 'leadModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
